<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" type="image/png" href="./img/rock.png">
    <script src="./js/game.js" defer></script>
</head>
<body>
    <div id="header">
        <h1>Rock Paper Scissors</h1>
    </div>
    <div id="play-area" class="flex-column-centre">
        <div>
            <p>Choose a move.</p>
        </div>
        <div id="btn-container">
            <button id="rock-btn" data-value="rock"><img src='./img/rock.png'></button>
            <button id="paper-btn" data-value="paper"><img src='./img/paper.png'></button>
            <button id="scissor-btn" data-value="scissors"><img src='./img/scissors.png'></button>
        </div>
        <div id="result-container">
            <p id="result-txt">First to 5 rounds wins.</p>
        </div>
    </div>
    <div id="info-container">
        <div class="info-box box-shadow">
            <p id="p-tally-txt">You: 0 wins</p>
        </div>
        <div class="info-box box-shadow">
            <p id="round-txt">Round 0</p>
        </div>
        <div class="info-box box-shadow">
            <p id="c-tally-txt">AI: 0 wins</p>
        </div>
    </div>
    <div id="win-loss-container" class="flex-column-centre">
        <p id="win-loss-p"></p>
    </div>
    <div id="footer" class="flex-column-centre">
        <p>Made by @winnytp. See the <a href="https://github.com/winnytp/rock-paper-scissors">source code.</a></p>
    </div>
</body>
</html>
